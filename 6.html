<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apprendre le Hangeul - Leçon 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@400;600&display=swap');

        :root {
            --primary: #4F46E5;
            --primary-dark: #3730A3;
            --bg-color: #F8FAFC;
            --nav-height: 70px;
        }

        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1E293B;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vh 5vw;
            margin-bottom: var(--nav-height); 
            position: relative;
            box-sizing: border-box;
        }

        .content-box {
            width: 100%;
            max-width: 1200px;
            margin: auto;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-box.active {
            opacity: 1;
            transform: translateY(0);
        }

        .title-main {
            font-size: clamp(1.5rem, 5vh, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5vh;
        }

        .subtitle-main {
            font-size: clamp(1rem, 2.5vh, 1.5rem);
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 1vh;
        }

        .desc-text {
            font-size: clamp(1.1rem, 2.8vh, 1.8rem);
            line-height: 1.5;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .char-card {
            background: white;
            border-radius: clamp(1rem, 3vh, 2rem);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: clamp(1.5rem, 4vh, 3rem);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: clamp(200px, 30vw, 320px);
            max-height: 55vh;
            border: 2px solid #F1F5F9;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hangeul-large {
            font-size: clamp(4rem, 15vh, 9rem);
            font-weight: 700;
            line-height: 1;
            transition: color 0.5s ease;
        }

        .ipa-text {
            color: #818CF8;
            font-weight: 600;
            font-size: clamp(0.9rem, 2vh, 1.2rem);
            margin-top: 0.5rem;
            text-transform: none !important;
        }

        .illustration-img {
            max-height: clamp(150px, 35vh, 400px);
            width: auto;
            object-fit: contain;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            z-index: 100;
        }

        .btn-nav {
            padding: 0.6rem clamp(1rem, 2vw, 1.5rem);
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: clamp(0.875rem, 2vh, 1rem);
        }

        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-secondary { color: #64748B; border: 1px solid #CBD5E1; }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.5vh;
            width: 100%;
            max-width: 700px;
            margin-top: 2vh;
        }

        .quiz-option {
            background: white;
            border: 2px solid #E2E8F0;
            border-radius: 1rem;
            padding: clamp(0.8rem, 2vh, 1.5rem);
            font-size: clamp(1.2rem, 3.5vh, 2rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option.correct { border-color: #10B981; background: #ECFDF5; color: #059669; }
        .quiz-option.wrong { border-color: #EF4444; background: #FEF2F2; color: #DC2626; }

        .mic-btn {
            width: clamp(60px, 10vh, 90px);
            height: clamp(60px, 10vh, 90px);
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vh, 2.5rem);
            margin: 2vh auto;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mic-btn.recording {
            background: #EF4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status-large {
            font-size: clamp(1.2rem, 3.5vh, 1.8rem);
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .nav-bar { padding: 0 1rem; }
            .btn-nav span { display: none; }
            .quiz-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <main class="app-container">
        <div id="lesson-content" class="content-box"></div>
    </main>

    <nav class="nav-bar">
        <button id="prev-btn" class="btn-nav btn-secondary" onclick="movePage(-1)">
            <i class="ph ph-caret-left"></i> <span>Précédent</span>
        </button>
        <div id="progress" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Leçon 6</div>
        <button id="next-btn" class="btn-nav btn-primary" onclick="movePage(1)">
            <span>Suivant</span> <i class="ph ph-caret-right"></i>
        </button>
    </nav>

    <script>
        const SOUNDS = {
            ㅐ: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745201/%E3%85%90_xfefds.mp3',
            ㅔ: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745202/%E3%85%94_i8suoq.mp3',
            새: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745597/%E1%84%89%E1%85%A2_xlknhj.mp3',
            게: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745595/%E1%84%80%E1%85%A6_audxev.mp3',
            더: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773555977/%E1%84%83%E1%85%A5_h2asn2.mp3',
            배: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745602/%E1%84%87%E1%85%A2_ycrbwj.mp3',
            재: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745805/%E1%84%8C%E1%85%A2_ctp8rg.mp3',
            개: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745594/%E1%84%80%E1%85%A2_okho0x.mp3',
            거: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773555976/%E1%84%80%E1%85%A5_nhejy9.mp3',
            베개: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773746046/%E1%84%87%E1%85%A6%E1%84%80%E1%85%A2_ernpoz.mp3'
        };

        const pages = [
            { type: 'cover', subtitle: 'Chapitre 2 - Les voyelles monophtongues', title: 'Leçon 6 - ㅐ, ㅔ', btnText: 'Commencer', isCompleted: true },
            { type: 'text', text: "Bonjour ! Aujourd'hui, c'est la dernière leçon sur les voyelles simples, et nous allons apprendre deux lettres un peu particulières.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745376/6-1_uenuh8.wav', isCompleted: true },
            { type: 'char-audio', char: 'ㅐ', subtitle: 'Voyelle ouverte antérieure non-arrondie', text: "Cette lettre est « ㅐ ». Elle se transcrit par /æ/ ou /ɛ/ dans l'alphabet phonétique et elle est plus ouverte que la voyelle française /e/ comme dans le mot « clé ».", charAudio: SOUNDS.ㅐ, audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745374/6-2_bhrjlk.wav', isCompleted: true },
            { type: 'card-image', char: 'ㅐ', image: 'https://res.cloudinary.com/de76i94ia/image/upload/v1773571677/%E3%85%90_rvwze8.jpg', text: "À cause de la forme de cette lettre, les gens l'appellent souvent « 아이 », c'est-à-dire la combinaison de « ㅏ » et « ㅣ ». Comme c'est une voyelle ouverte, on ouvre grand la bouche de haut en bas et sur les côtés, un peu comme pour le « ㅏ ». Mais contrairement au « ㅏ » où la langue se place en arrière, « ㅐ » est une voyelle antérieure, donc la langue se place vers l'avant.", charAudio: SOUNDS.ㅐ, audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745382/6-3_invvyz.wav', isCompleted: true },
            { type: 'diagram', math: ['ㅅ', 'ㅐ', '새'], charAudio: SOUNDS.새, text: "Comme on peut le voir à sa forme, « ㅐ » est une voyelle avec un long trait vertical, elle se place donc à droite de la consonne.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745370/6-4_kk2uh0.wav', isCompleted: true },
            { type: 'char-audio', char: 'ㅔ', subtitle: 'Voyelle moyenne antérieure non-arrondie', text: "Cette lettre est « ㅔ ». Sa prononciation est très similaire au /e/ français, comme dans le mot « clé ».", charAudio: SOUNDS.ㅔ, audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745223/6-5_pveueg.wav', isCompleted: true },
            { type: 'card-image', char: 'ㅔ', image: 'https://res.cloudinary.com/de76i94ia/image/upload/v1773571681/%E3%85%94_k3qx59.jpg', text: "À cause de la forme de cette lettre, les gens l'appellent souvent « 어이 », c'est-à-dire la combinaison de « ㅓ » et « ㅣ ». On baisse la mâchoire comme lorsqu'on prononce le « ㅓ ». Cependant, comme on l'appelle une voyelle moyenne, la bouche ne s'ouvre pas aussi grand sur les côtés que pour les voyelles ouvertes comme « ㅏ » ou « ㅐ ».", charAudio: SOUNDS.ㅔ, audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745486/6-6_zzcfyk.wav', isCompleted: true },
            { type: 'diagram', math: ['ㄱ', 'ㅔ', '게'], charAudio: SOUNDS.게, text: "Comme on peut le voir à sa forme, « ㅔ » est une voyelle avec un long trait vertical, elle se place donc à droite de la consonne.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745225/6-7_kergyo.wav', isCompleted: true },
            { type: 'info-card', title: 'Neutralisation des voyelles', text: "Bien que « ㅐ » et « ㅔ » soient deux sons clairement différents selon les règles officielles de prononciation, ils ont tendance à se neutraliser et sont très peu distingués dans le langage moderne. Selon des recherches récentes, la plupart des jeunes natifs ne font plus la différence entre ces deux sons et les prononcent de la même manière.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745490/6-8_yemwrr.wav', isCompleted: true },
            { type: 'info-card', title: 'Neutralisation des voyelles', text: "Comme ces deux sons sont facilement distinguables pour les francophones, il n'y a aucun problème à les prononcer différemment. Pourtant, il est toujours important de comprendre que les Coréens pourraient prononcer ces deux sons sans les distinguer clairement, et vous devrez alors souvent deviner leur orthographe.", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745485/6-9_t3s02o.wav', isCompleted: true },
            { type: 'quiz', question: 'Écoutez bien et cliquez sur la lettre correcte.', audio: SOUNDS.더, options: ['더', '데', '도'], answer: '더', isCompleted: false },
            { type: 'quiz', question: 'Écoutez bien et cliquez sur la lettre correcte.', audio: SOUNDS.새, options: ['사', '자', '새'], answer: '새', isCompleted: false },
            { type: 'quiz', question: 'Écoutez bien et cliquez sur la lettre correcte.', audio: SOUNDS.배, options: ['부', '버', '배'], answer: '배', isCompleted: false },
            { type: 'reverse-quiz', question: 'Écoutez et cliquez sur le son correspondant à la lettre.', target: '개', answer: '개', options: [
                { audio: SOUNDS.재, label: 'Audio 1', value: '재' },
                { audio: SOUNDS.개, label: 'Audio 2', value: '개' },
                { audio: SOUNDS.거, label: 'Audio 3', value: '거' }
            ], isCompleted: false },
            { type: 'speech', text: 'Répétez après moi !', target: '베개', ipa: '/be.gɛ/', audio: SOUNDS.베개, isCompleted: false },
            { type: 'speech', text: 'Répétez après moi !', target: '새', ipa: '/sɛ/', audio: SOUNDS.새, isCompleted: false },
            { type: 'outro', text: "Vous vous débrouillez super bien ! Nous avons maintenant vu toutes les voyelles simples. Passez au Chapitre 3 pour découvrir de nouvelles consonnes, et élargir encore plus le nombre de lettres que vous pouvez écrire et prononcer !", audio: 'https://res.cloudinary.com/de76i94ia/video/upload/v1773745379/6-10_hywabu.wav', isCompleted: true }
        ];

        let currentPage = 0;
        let currentAudio = null;
        let interactionAudio = null;
        let backgroundAudioTimeout = null;
        let transitionSynth, correctSound, completionSound, wrongSound;
        
        let mediaRecorder;
        let audioChunks = [];
        let currentStream = null;
        let speechTries = 0;
        let recordingTimer = null;
        const MAX_TRIES = 2;
        const RECORDING_LIMIT = 6000; 

        const BASE_44_ORIGIN = "https://coreeno.base44.app";
        const CLOVA_API_FUNCTION_URL = BASE_44_ORIGIN + '/api/functions/naverClovaSpeech';

        window.onload = () => {
            transitionSynth = new Tone.Synth().toDestination();
            correctSound = new Tone.PolySynth().toDestination();
            wrongSound = new Tone.PolySynth().toDestination();
            completionSound = new Tone.PolySynth().toDestination();
            renderPage();
            window.addEventListener('blur', stopAllAudio);
        };

        // 브라우저 정책 대응: 사용자가 처음 화면 상호작용을 할 때 Tone 활성화
        async function ensureToneStarted() {
            if (Tone.context.state !== 'running') {
                await Tone.start();
                Tone.Destination.volume.value = -8;
            }
        }

        function stopAllAudio() {
            if (backgroundAudioTimeout) {
                clearTimeout(backgroundAudioTimeout);
                backgroundAudioTimeout = null;
            }
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            if (interactionAudio) {
                interactionAudio.pause();
                interactionAudio.currentTime = 0;
                interactionAudio = null;
            }
        }

        function playBackgroundAudio(url, delay = 0) {
            if (backgroundAudioTimeout) clearTimeout(backgroundAudioTimeout);
            if (!url) return; 
            backgroundAudioTimeout = setTimeout(() => {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    currentAudio = null;
                }
                currentAudio = new Audio(url);
                currentAudio.play().catch(e => console.log('Audio autoplay prevented'));
            }, delay);
        }

        function playInteractionAudio(url) {
            if (!url) return; 
            if (backgroundAudioTimeout) {
                clearTimeout(backgroundAudioTimeout);
                backgroundAudioTimeout = null;
            }
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            if (interactionAudio) {
                interactionAudio.pause();
                interactionAudio.currentTime = 0;
            }
            interactionAudio = new Audio(url);
            interactionAudio.play().catch(e => console.log('Audio play error', e));
        }

        async function movePage(step) {
            await ensureToneStarted();
            
            const nextIdx = currentPage + step;
            if (nextIdx >= 0 && nextIdx < pages.length) {
                stopAllAudio();
                stopMicrophone(); 
                transitionSynth.triggerAttackRelease("C4", "8n");
                currentPage = nextIdx;
                renderPage();
            }
        }

        function renderPage() {
            const page = pages[currentPage];
            const container = document.getElementById('lesson-content');
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            const progress = document.getElementById('progress');

            speechTries = 0; 
            container.classList.remove('active');
            
            setTimeout(() => {
                container.innerHTML = '';
                let html = '';

                nextBtn.disabled = (currentPage === pages.length - 1) || !page.isCompleted;
                prevBtn.disabled = (currentPage === 0 || currentPage === pages.length - 1);
                
                progress.innerText = `Page ${currentPage + 1} / ${pages.length}`;

                switch (page.type) {
                    case 'cover':
                        html = `<div class="flex flex-col items-center"><h2 class="subtitle-main">${page.subtitle}</h2><h1 class="title-main">${page.title}</h1><button onclick="movePage(1)" class="mt-4 px-10 py-3 bg-indigo-600 text-white rounded-full text-lg font-bold hover:bg-indigo-700 transition-all shadow-lg">${page.btnText}</button></div>`;
                        nextBtn.style.display = 'none'; prevBtn.style.display = 'none'; break;

                    case 'text':
                        html = `<p class="desc-text font-medium">${page.text}</p>`;
                        nextBtn.style.display = 'flex'; prevBtn.style.display = 'flex'; break;

                    case 'info-card':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <div class="char-card mb-6 w-full max-w-lg px-6 py-6 sm:px-10">
                                    <div class="flex flex-col items-center w-full">
                                        <div class="w-14 h-14 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center text-3xl mb-4">
                                            <i class="ph ph-info"></i>
                                        </div>
                                        <p class="text-2xl sm:text-3xl font-bold text-slate-800 text-center">${page.title}</p>
                                    </div>
                                </div>
                                <p class="desc-text">${page.text}</p>
                            </div>
                        `;
                        break;

                    case 'diagram':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <div class="char-card mb-8 px-6 sm:px-12 py-8" onclick="playInteractionAudio('${page.charAudio}')">
                                    <div class="flex items-center justify-center gap-3 sm:gap-6 text-5xl sm:text-7xl font-bold">
                                        <span class="text-slate-800">${page.math[0]}</span>
                                        <span class="text-slate-300 text-3xl sm:text-5xl">+</span>
                                        <span class="text-slate-800">${page.math[1]}</span>
                                        <span class="text-slate-300 text-3xl sm:text-5xl">=</span>
                                        <span class="text-indigo-600">${page.math[2]}</span>
                                    </div>
                                    <div class="mt-6 text-indigo-300"><i class="ph ph-speaker-high text-2xl"></i></div>
                                </div>
                                <p class="desc-text">${page.text}</p>
                            </div>
                        `;
                        break;

                    case 'char-audio':
                        html = `<div class="flex flex-col items-center"><div class="char-card" onclick="playInteractionAudio('${page.charAudio}')"><div class="hangeul-large text-indigo-600">${page.char}</div><p class="text-indigo-400 font-bold uppercase tracking-widest text-xs mt-2 text-center px-4">${page.subtitle}</p><div class="mt-4 text-indigo-300"><i class="ph ph-speaker-high text-2xl"></i></div></div><p class="desc-text mt-6">${page.text}</p></div>`;
                        break;

                    case 'card-image':
                        html = `<div class="flex flex-col items-center"><div class="bg-white p-3 rounded-[2rem] shadow-md border border-slate-100 mb-4"><img src="${page.image}" class="illustration-img" onerror="this.src='https://placehold.co/400x300?text=Position+Langue'"></div><button onclick="playInteractionAudio('${page.charAudio}')" class="audio-play-btn mb-4 text-indigo-600 font-bold flex items-center gap-2"><i class="ph ph-speaker-high"></i> Écouter</button><p class="desc-text">${page.text}</p></div>`;
                        break;

                    case 'quiz':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <h2 class="subtitle-main text-slate-900 mb-4">${page.question}</h2>
                                <button onclick="playInteractionAudio('${page.audio}')" class="w-20 h-20 rounded-full bg-indigo-50 text-indigo-600 text-3xl flex items-center justify-center hover:bg-indigo-100 transition-all shadow-inner mb-6"><i class="ph ph-speaker-high"></i></button>
                                <div class="quiz-grid">
                                    ${page.options.map(opt => {
                                        let extraClass = (page.isCompleted && opt === page.answer) ? 'correct' : '';
                                        return `<button class="quiz-option ${extraClass}" onclick="checkQuizAnswer(this, '${opt}', '${page.answer}')">${opt}</button>`;
                                    }).join('')}
                                </div>
                                <p id="quiz-feedback" class="h-8 mt-4 text-lg font-bold">${page.isCompleted ? '<span class="text-green-500">Excellent !</span>' : ''}</p>
                            </div>
                        `;
                        break;

                    case 'reverse-quiz':
                        html = `
                            <div class="flex flex-col items-center w-full">
                                <h2 class="subtitle-main text-slate-900 mb-4">${page.question}</h2>
                                <div class="char-card mb-6 py-4 px-10 shadow-sm border-slate-200">
                                    <div class="hangeul-large text-indigo-600" style="font-size: clamp(3rem, 10vh, 6rem);">${page.target}</div>
                                </div>
                                <div class="flex justify-center gap-4 sm:gap-8 w-full max-w-lg mt-2">
                                    ${page.options.map((opt, i) => {
                                        let btnClass = (page.isCompleted && opt.value === page.answer) ? 'border-green-500 bg-green-50 text-green-600' : 'border-slate-200 text-slate-600';
                                        let showTrans = page.isCompleted ? `<p class="mt-2 font-bold text-slate-500">${opt.value}</p>` : `<p class="mt-2 font-bold text-slate-400 opacity-0 group-hover:opacity-50 transition-opacity">?</p>`;
                                        return `
                                        <div class="flex flex-col items-center group bg-white p-4 rounded-2xl border-2 border-transparent hover:border-slate-100 transition-all">
                                            <span class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">${opt.label}</span>
                                            <button class="w-14 h-14 sm:w-16 sm:h-16 rounded-full border-2 bg-indigo-50 border-indigo-100 text-indigo-600 text-2xl flex items-center justify-center hover:bg-indigo-100 hover:scale-105 transition-all shadow-sm mb-4"
                                                onclick="playInteractionAudio('${opt.audio}')">
                                                <i class="ph ph-speaker-high"></i>
                                            </button>
                                            <button class="px-5 py-2 border-2 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all select-opt-btn ${btnClass}"
                                                onclick="checkReverseQuizAnswer(this, '${opt.value}', '${page.answer}')">
                                                Choisir
                                            </button>
                                            <div class="transcription-container text-lg h-8">${showTrans}</div>
                                        </div>`;
                                    }).join('')}
                                </div>
                                <p id="quiz-feedback" class="h-8 mt-4 text-lg font-bold">${page.isCompleted ? '<span class="text-green-500">Excellent !</span>' : ''}</p>
                            </div>
                        `;
                        break;

                    case 'speech':
                        html = `
                            <div class="flex flex-col items-center">
                                <h2 class="subtitle-main text-slate-900">${page.text}</h2>
                                <div class="char-card mb-4" onclick="playInteractionAudio('${page.audio}')">
                                    <div id="target-char" class="hangeul-large ${page.isCompleted ? 'text-green-500' : 'text-slate-300'}">${page.target}</div>
                                    <p class="ipa-text">${page.ipa}</p>
                                    <div class="mt-2 text-indigo-300"><i class="ph ph-speaker-high text-xl"></i></div>
                                </div>
                                <div id="speech-ui-container" class="flex flex-col items-center min-h-[140px]">
                                    ${page.isCompleted ? `
                                        <div class="mic-btn opacity-40"><i class="ph ph-check"></i></div>
                                        <p class="text-green-500 font-bold status-large">Très bien !</p>
                                    ` : `
                                        <button id="mic-btn" class="mic-btn" onclick="toggleRecording('${page.target}')"><i class="ph ph-microphone"></i></button>
                                        <p id="speech-status" class="text-slate-500 font-medium text-sm transition-all duration-300">Cliquez sur le micro pour parler</p>
                                        <p id="speech-tries" class="text-[10px] text-slate-400 mt-1 uppercase">Essai: 0 / 2</p>
                                    `}
                                </div>
                            </div>
                        `;
                        break;

                    case 'outro':
                        html = `<div class="flex flex-col items-center"><div class="text-5xl text-indigo-500 mb-4"><i class="ph ph-sparkle"></i></div><p class="desc-text font-bold text-center">${page.text}</p></div>`;
                        nextBtn.style.display = 'none';

                        completionSound.triggerAttackRelease(["E5", "G5", "C6", "E6"], "2n");
                        playBackgroundAudio(page.audio, 1000);
                        
                        setTimeout(() => {
                            window.parent.postMessage({ type: 'lesson_complete' }, '*');
                        }, 1000);
                        break;
                }

                container.innerHTML = html;
                container.classList.add('active');

                if (page.audio && page.type !== 'quiz' && page.type !== 'reverse-quiz' && page.type !== 'speech' && page.type !== 'outro') {
                    playBackgroundAudio(page.audio, 500);
                }
            }, 50);
        }

        async function checkQuizAnswer(btn, selected, correct) {
            await ensureToneStarted();
            const page = pages[currentPage];
            if (page.isCompleted) return;
            const feedback = document.getElementById('quiz-feedback');
            if (selected === correct) {
                btn.classList.add('correct');
                feedback.innerHTML = '<span class="text-green-500">Excellent !</span>';
                correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                page.isCompleted = true;
                document.getElementById('next-btn').disabled = false;
            } else {
                btn.classList.add('wrong');
                feedback.innerHTML = '<span class="text-red-500">Réessayez !</span>';
                wrongSound.triggerAttackRelease(['G3', 'F3'], '8n');
                setTimeout(() => btn.classList.remove('wrong'), 1000);
            }
        }

        async function checkReverseQuizAnswer(btn, selected, correct) {
            await ensureToneStarted();
            const page = pages[currentPage];
            if (page.isCompleted) return;
            const feedback = document.getElementById('quiz-feedback');
            
            document.querySelectorAll('.select-opt-btn').forEach(b => {
                b.classList.remove('border-red-500', 'bg-red-50', 'text-red-600');
            });

            if (selected === correct) {
                btn.classList.remove('border-slate-200', 'text-slate-600');
                btn.classList.add('border-green-500', 'bg-green-50', 'text-green-600');
                feedback.innerHTML = '<span class="text-green-500">Excellent !</span>';
                correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                page.isCompleted = true;
                document.getElementById('next-btn').disabled = false;
                
                const containers = document.querySelectorAll('.transcription-container');
                page.options.forEach((opt, i) => {
                    containers[i].innerHTML = `<p class="mt-2 font-bold text-slate-500">${opt.value}</p>`;
                });
            } else {
                btn.classList.remove('border-slate-200', 'text-slate-600');
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-600');
                feedback.innerHTML = '<span class="text-red-500">Réessayez !</span>';
                wrongSound.triggerAttackRelease(['G3', 'F3'], '8n');
                
                setTimeout(() => {
                    if(!page.isCompleted) {
                        btn.classList.remove('border-red-500', 'bg-red-50', 'text-red-600');
                        btn.classList.add('border-slate-200', 'text-slate-600');
                    }
                }, 1000);
            }
        }

        async function toggleRecording(target) {
            await ensureToneStarted();
            const btn = document.getElementById('mic-btn');
            const status = document.getElementById('speech-status');
            if (!btn) return;

            if (btn.classList.contains('recording')) {
                stopRecordingManually();
            } else {
                if (speechTries >= MAX_TRIES) return;
                try {
                    currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(currentStream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            const base64Audio = reader.result.split(',')[1];
                            await verifySpeech(base64Audio, target);
                        };
                        stopMicrophone();
                    };
                    mediaRecorder.start();
                    btn.classList.add('recording');
                    if(status) status.innerText = "Écoute...";
                    if (recordingTimer) clearTimeout(recordingTimer);
                    recordingTimer = setTimeout(() => {
                        if (mediaRecorder && mediaRecorder.state === "recording") stopRecordingManually();
                    }, RECORDING_LIMIT);
                } catch (err) { 
                    if(status) status.innerText = "Erreur micro. Veuillez autoriser l'accès."; 
                }
            }
        }

        function stopRecordingManually() {
            if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
            const btn = document.getElementById('mic-btn');
            if (btn) btn.classList.remove('recording');
            if (recordingTimer) clearTimeout(recordingTimer);
        }

        function stopMicrophone() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        async function verifySpeech(audioBase64, referenceText) {
            const status = document.getElementById('speech-status');
            const triesDisplay = document.getElementById('speech-tries');
            const btn = document.getElementById('mic-btn');
            const charText = document.getElementById('target-char');
            const page = pages[currentPage];
            
            speechTries++;
            if(triesDisplay) triesDisplay.innerText = `Essai: ${speechTries} / ${MAX_TRIES}`;

            try {
                await fetch(CLOVA_API_FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audioBase64: audioBase64, languageCode: "Kor", referenceText: referenceText })
                });
                
                if (speechTries === 1) {
                    if(charText) charText.className = "hangeul-large text-indigo-600";
                    playInteractionAudio(page.audio);
                    if (status) {
                        status.innerText = "Essayons encore une fois !";
                        status.className = "text-green-500 status-large transition-all duration-300 transform scale-110";
                    }
                } else if (speechTries >= 2) {
                    correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                    page.isCompleted = true;
                    if(charText) charText.className = "hangeul-large text-green-500";
                    const container = document.getElementById('speech-ui-container');
                    if(container) {
                        container.innerHTML = `
                            <div class="mic-btn opacity-40"><i class="ph ph-check"></i></div>
                            <p class="text-green-500 font-bold status-large">Très bien !</p>
                        `;
                    }
                    document.getElementById('next-btn').disabled = false;
                }
            } catch (error) {
                if (speechTries >= MAX_TRIES) {
                    correctSound.triggerAttackRelease(['G5', 'C6'], '4n');
                    page.isCompleted = true;
                    if(charText) charText.className = "hangeul-large text-green-500";
                    document.getElementById('next-btn').disabled = false;
                    const container = document.getElementById('speech-ui-container');
                    if(container) {
                        container.innerHTML = `
                            <div class="mic-btn opacity-40"><i class="ph ph-check"></i></div>
                            <p class="text-green-500 font-bold status-large">Très bien !</p>
                        `;
                    }
                }
            }
        }
    </script>
</body>
